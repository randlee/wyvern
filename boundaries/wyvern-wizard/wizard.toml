boundary_id = "BOUNDARY-WyvernWizard"
owner_package = "wyvern-wizard"
name = "WyvernWizard"

[dependencies]
allowed_dependencies = ["wyvern-schema", "serde_json"]
forbidden_dependencies = ["wyvern", "wyvern-window", "wyvern-host", "wyvern-mcp", "wry", "winit", "rfd", "axum", "tokio", "tower", "hyper", "reqwest"]

[ownership]
io_owns = ["wizard_session", "history_cursor", "stack_snapshot", "navigation"]
io_forbidden = ["file_io", "network_io", "window_creation", "webview", "ipc", "async_runtime", "http_routes", "browser_history_internals"]

[public_api]
# Host and tests may import only these modules (enforced by sc-lint + review):
allowed_modules = ["wyvern_wizard::WizardSession", "wyvern_wizard::WizardSnapshot", "wyvern_wizard::WizardError", "wyvern_wizard::NavigateOutcome"]

[enforcement]
lint_rules = ["LINT-BOUNDARY-WIZARD-PURE-LOGIC"]

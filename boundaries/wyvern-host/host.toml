boundary_id = "BOUNDARY-WyvernHost"
owner_package = "wyvern-host"
name = "WyvernHost"

[dependencies]
allowed_dependencies = ["wyvern-schema", "serde", "serde_json", "axum", "tokio", "tower", "tower-http", "tracing", "rfd", "webbrowser", "dirs", "pulldown-cmark", "ammonia", "wyvern-wizard"]
forbidden_dependencies = ["wyvern", "wyvern-mcp", "wyvern-window", "wry", "winit"]
forbidden_edges = ["wyvern-host -> wyvern", "wyvern-host -> wyvern-mcp", "wyvern-host -> wyvern-window"]

[ownership]
io_owns = ["tcp_bind", "http_server", "static_file_serve", "dialog_session", "wizard_session", "wizard_routes", "result_channel", "native_file_picker", "browser_registry", "system_browser_launch", "dialog_content_html", "dialog_preview_html"]
io_forbidden = ["stdin_reading", "stdout_writing", "arg_parsing", "webview_creation", "inline_html_embed", "html_template_generation", "mcp_protocol", "embedded_viewer_spawn", "wizard_history_internals", "wizard_domain_logic"]

[enforcement]
lint_rules = ["LINT-BOUNDARY-HOST-NO-CLI", "LINT-BOUNDARY-HOST-NO-WEBVIEW"]

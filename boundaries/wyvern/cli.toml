boundary_id = "BOUNDARY-WyvernCli"
owner_package = "wyvern-cli"
name = "WyvernCli"

[dependencies]
# wyvern-viewer: optional dep for dev binary-path helpers; embedded spawn uses subprocess (no wry in CLI)
allowed_dependencies = [
  "wyvern-schema",
  "wyvern-host",
  "wyvern-viewer",
  "serde_json",
  "tracing",
  "tracing-subscriber",
  "sc-observability",
  "dirs",
  "rust-embed",
]
forbidden_dependencies = ["wyvern-wizard", "wyvern-mcp", "wry", "winit", "rfd"]
forbidden_edges = ["wyvern-cli -> wyvern-mcp"]

[ownership]
io_owns = ["stdin_reading", "stdout_writing", "stderr_writing", "arg_parsing", "host_options", "viewer_flag", "embedded_viewer_spawn", "viewer_show_hide"]
io_forbidden = ["http_server", "webview_creation", "static_file_serve", "dialog_content_html"]

[enforcement]
lint_rules = ["LINT-BOUNDARY-CLI-NO-WINDOW-DIRECT"]

boundary_id = "BOUNDARY-WyvernCli"
owner_package = "wyvern"
name = "WyvernCli"

[dependencies]
allowed_dependencies = ["wyvern-schema", "wyvern-window"]
forbidden_dependencies = ["wyvern-wizard", "wyvern-mcp"]
forbidden_edges = ["wyvern -> wyvern-mcp"]

[ownership]
io_owns = ["stdin_reading", "stdout_writing", "stderr_writing", "arg_parsing"]
io_forbidden = ["webview_creation", "window_lifecycle"]

[enforcement]
lint_rules = ["LINT-BOUNDARY-CLI-NO-WINDOW-DIRECT"]

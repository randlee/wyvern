boundary_id = "BOUNDARY-WyvernViewer"
owner_package = "wyvern-viewer"
name = "WyvernViewer"
status = "active"

[dependencies]
allowed_dependencies = ["wry", "winit", "url", "tracing", "gtk"]
forbidden_dependencies = ["wyvern", "wyvern-mcp", "wyvern-host", "wyvern-schema"]
forbidden_edges = ["wyvern-viewer -> wyvern-host", "wyvern-viewer -> wyvern-schema"]

[ownership]
io_owns = ["webview_open_url", "webview_show_hide", "viewer_lifecycle_stdin", "chrome_presentation_ipc"]
io_forbidden = ["http_server", "stdout_writing", "inline_html"]

[enforcement]
lint_rules = ["LINT-BOUNDARY-VIEWER-URL-ONLY"]

name: Release Retry Distribution

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
        type: string

permissions:
  contents: read

env:
  RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml

jobs:
  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libxkbcommon-x11-0 \
            libgl1-mesa-dri \
            mesa-utils \
            at-spi2-core \
            dbus-x11 \
            xvfb

      - name: Publish crates in dependency order (idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'
          version="${tag#v}"

          crate_exists() {
            local crate="$1"
            curl -fsS "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null 2>&1
          }

          publish_if_missing() {
            local crate="$1"
            local wait_seconds="${2:-0}"
            if crate_exists "$crate"; then
              echo "${crate} ${version} already published; skipping"
              return 0
            fi
            set +e
            output=$(cargo publish -p "$crate" --locked 2>&1)
            status=$?
            set -e
            if [[ "$status" -eq 0 ]]; then
              echo "$output"
            elif echo "$output" | grep -q 'already exists on crates.io index'; then
              echo "${crate} ${version} already published; skipping"
            else
              echo "$output" >&2
              exit "$status"
            fi
            if [[ "$wait_seconds" -gt 0 ]]; then
              sleep "$wait_seconds"
            fi
          }

          while IFS='|' read -r crate wait_seconds; do
            [[ -n "$crate" ]] || continue
            publish_if_missing "$crate" "${wait_seconds:-0}"
          done < <(
            python3 scripts/release_artifacts.py list-publish-plan \
              --manifest "${RELEASE_ARTIFACT_MANIFEST}"
          )

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: randlee/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute release tarball SHA256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'
          tarball_path="${RUNNER_TEMP:?RUNNER_TEMP is required}/release.tar.gz"
          tarball_url="https://github.com/randlee/wyvern/releases/download/${tag}/wyvern-macos-aarch64.tar.gz"
          echo "tarball_url=${tarball_url}" >> "$GITHUB_OUTPUT"
          curl -fsSL --retry 5 --retry-delay 30 --retry-all-errors -o "${tarball_path}" "${tarball_url}"
          sha256=$(sha256sum "${tarball_path}" | awk '{print $1}')
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'
          version="${tag#v}"
          sha256='${{ steps.sha.outputs.sha256 }}'
          tarball_url='${{ steps.sha.outputs.tarball_url }}'
          formula="homebrew-tap/Formula/wyvern.rb"
          sed -i "s|version \"[^\"]*\"|version \"${version}\"|g" "$formula"
          sed -i "s|url \"[^\"]*\"|url \"${tarball_url}\"|g" "$formula"
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${sha256}\"|g" "$formula"

      - name: Commit and push to homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'
          version="${tag#v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wyvern.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump wyvern to v${version}"
          git push

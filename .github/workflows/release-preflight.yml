name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version candidate (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string
      run_by_agent:
        description: "Must be 'publisher' (agent ownership assertion)"
        required: true
        default: "publisher"
        type: string

permissions:
  contents: read

env:
  RELEASE_ARTIFACT_MANIFEST: release/publish-artifacts.toml

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce publisher ownership input
        shell: bash
        run: |
          set -euo pipefail
          runner='${{ github.event.inputs.run_by_agent }}'
          if [[ "$runner" != "publisher" ]]; then
            echo "Preflight must be executed by publisher agent. Got run_by_agent='$runner'" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Normalize version input
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw='${{ github.event.inputs.version }}'
          tag="$raw"
          [[ "$tag" == v* ]] || tag="v${tag}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$raw' (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"

      - name: Run canonical retained release validation suite
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_release.py all \
            --version '${{ steps.meta.outputs.release_version }}' \
            --findings release-findings.json

      - name: Upload release findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-findings
          path: release-findings.json

      - name: Fail if canonical validation failed
        if: steps.validate.outcome != 'success'
        shell: bash
        run: exit 1

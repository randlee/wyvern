name: CI

on:
  pull_request:
    branches: [develop, main, "integrate/*"]
  push:
    branches: [develop, main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # webkit2gtk for wry; xkbcommon-x11 for winit X11; mesa + xvfb for headless GL (phase-A README)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxkbcommon-x11-0 \
            libgl1-mesa-dri \
            mesa-utils \
            at-spi2-core \
            dbus-x11 \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        if: runner.os != 'Linux'
        run: cargo test --workspace

      # GTK/winit need a display; ubuntu-latest is headless — use Xvfb (docs/plans/phase-A/README.md).
      # WebKitGTK GPU compositing crashes under xvfb (GLXBadWindow) without software-GL flags.
      - name: cargo test (Linux / xvfb)
        if: runner.os == 'Linux'
        env:
          GDK_BACKEND: x11
          LIBGL_ALWAYS_SOFTWARE: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: dbus-run-session -- xvfb-run -a cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install sc-lint from crates.io
        run: cargo install sc-lint --version 0.4.0 --locked

      - name: sc-lint check
        run: sc-lint check native --config .sc-lint.toml

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  boundaries:
    name: Boundary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: sc-lint-boundary check
        run: echo "sc-lint-boundary enforcement — wired in Phase 2"

[package]
name = "wayland-scanner"
version = "0.31.10"
authors = ["Elinor Berger <elinor@safaradeg.net>"]
repository = "https://github.com/smithay/wayland-rs"
documentation = "https://docs.rs/wayland-scanner/"
description = "Wayland Scanner for generating rust APIs from XML wayland protocol files."
license = "MIT"
categories = ["gui", "api-bindings"]
keywords = ["wayland", "codegen"]
edition = "2021"
rust-version = "1.71"
readme = "README.md"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.11"
quote = "1.0"
# Patched from upstream ^0.39 → 0.41 for RUSTSEC-2026-0194/0195.
# Drop this vendor when crates.io wayland-scanner publishes >=0.41 quick-xml.
quick-xml = "0.41"

[dev-dependencies]
similar = "2"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

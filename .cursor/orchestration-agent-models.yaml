# Cursor orchestration default models for Task spawns.
#
# Read from `.cursor/` skills, commands, and agents only (cursor-orchestration).
# Pass `model:` explicitly on each Task spawn.
#
# Precedence:
#   1. User-named model override for a role
#   2. Entry in this file
#   3. Agent frontmatter default (avoid — prefer explicit Task model)
#
# Contextual overrides (e.g. phase-ending review) stay in cursor-orchestration
# prose, not in this table.

version: 1

agents:
  rust-developer:
    model: grok-4.5-fast-xhigh
    alternates:
      - composer-2.5-fast
    notes: Implement/fix loops; default grok unless user prefers composer

  cursor-quality-mgr:
    model: composer-2.5-fast
    notes: QA coordinator only; favor speed

  req-qa:
    model: composer-2.5-fast
    notes: Structured deliverable checklist

  arch-qa:
    model: claude-sonnet-5-thinking-high
    notes: Precision / boundary gate; must be in Cursor Task model list

  rust-qa-agent:
    model: grok-4.5-fast-xhigh
    notes: Normal QA rounds; see phase-ending override in cursor-quality-mgr.md

  rust-best-practices-agent:
    model: composer-2.5-fast
    notes: Practice-id sweeps

  rust-service-hardening-agent:
    model: composer-2.5-fast
    notes: Often fast-exit / checklist

  flaky-test-qa:
    model: composer-2.5-fast
    notes: Narrow flaky-test contract

  qa-triage:
    model: inherit
    notes: Use agent frontmatter default (haiku)

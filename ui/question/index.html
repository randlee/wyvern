<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wyvern Question</title>
    <link rel="stylesheet" href="/shared/embedded-chrome.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="dialog dialog--panel" id="dialog" hidden>
      <header class="chrome">
        <h1 id="title">Question</h1>
      </header>
      <div id="cards" class="cards" data-testid="question-cards"></div>
      <p id="validation-hint" class="validation-hint" hidden>
        Select an answer for every question before submitting.
      </p>
      <div class="buttons" id="buttons" role="group">
        <button type="button" id="submit-btn" class="primary" data-testid="btn-submit">
          Submit
        </button>
      </div>
    </main>
    <p id="error" class="error" hidden></p>
    <script src="/shared/wyvern-api.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

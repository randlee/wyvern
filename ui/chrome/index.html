<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wyvern Chrome</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="titlebar" id="titlebar" hidden>
      <span class="titlebar-title" id="titlebar-title"></span>
      <div class="titlebar-controls" id="titlebar-controls" aria-label="Window controls"></div>
    </div>
    <main class="dialog" id="dialog" hidden>
      <h1 id="title"></h1>
      <p id="status" class="status" hidden></p>
      <div class="buttons" id="buttons" role="group"></div>
    </main>
    <p id="error" class="error" hidden></p>
    <script src="/shared/wyvern-api.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #f6f6f6;
      color: #1a1a1a;
    }
    #title-bar {
      -webkit-app-region: drag;
      padding-left: 72px;
      padding-right: 12px;
      height: 36px;
      line-height: 36px;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
      flex-shrink: 0;
    }
    #status-bar {
      padding: 4px 12px;
      font-size: 12px;
      opacity: 0.75;
      flex-shrink: 0;
    }
    #status-bar:empty { display: none; }
    #content {
      flex: 1;
      min-height: 0;
      padding: 12px 16px 8px;
      font-size: 13px;
      line-height: 1.45;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #content-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    #level-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      line-height: 0;
    }
    #level-icon svg,
    #level-icon img.resolved-icon {
      width: 32px;
      height: 32px;
      display: block;
    }
    #body {
      flex: 1;
      min-width: 0;
      word-wrap: break-word;
    }
    #body.plain-body {
      white-space: pre-wrap;
    }
    #body.markdown-body p { margin: 0 0 0.6em; }
    #body.markdown-body p:last-child { margin-bottom: 0; }
    #body.markdown-body h1,
    #body.markdown-body h2,
    #body.markdown-body h3 {
      margin: 0 0 0.4em;
      font-size: 1.1em;
    }
    #body.markdown-body ul,
    #body.markdown-body ol {
      margin: 0 0 0.6em;
      padding-left: 1.4em;
    }
    #input-field {
      -webkit-app-region: no-drag;
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      border: 1px solid #b0b0b0;
      border-radius: 4px;
      background: #fff;
      color: #1a1a1a;
      resize: vertical;
    }
    #input-field:focus {
      outline: 2px solid #2680eb;
      outline-offset: 1px;
      border-color: #2680eb;
    }
    #input-field.single-line {
      height: 34px;
      resize: none;
    }
    #input-field.multi-line {
      min-height: 88px;
    }
    #button-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 12px 12px;
      flex-shrink: 0;
    }
    #button-bar button {
      -webkit-app-region: no-drag;
      min-width: 72px;
      padding: 6px 14px;
      font-size: 13px;
      border: 1px solid #b0b0b0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    #button-bar button:focus {
      outline: 2px solid #2680eb;
      outline-offset: 1px;
    }
    #button-bar button.primary {
      background: #2680eb;
      border-color: #1a6fd0;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="title-bar">{{TITLE}}</div>
  {{STATUS_BLOCK}}
  <div id="content">
    <div id="content-row">
      {{LEVEL_ICON}}
      <div id="body" class="{{BODY_CLASS}}">{{MESSAGE}}</div>
    </div>
    {{INPUT_CONTROL}}
  </div>
  <div id="button-bar">{{BUTTONS}}</div>
  <script>
    (function () {
      var ctx = {{CONTEXT_JSON}};
      var field = document.getElementById("input-field");
      var bar = document.getElementById("button-bar");
      if (field) {
        field.focus();
        if (typeof field.select === "function" && field.value) {
          field.select();
        }
      }
      function submit(wire) {
        var payload = { kind: "input_submitted", button: wire };
        if (wire !== "cancel" && field) {
          payload.value = field.value;
        }
        window.ipc.postMessage(JSON.stringify(payload));
      }
      bar.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button[data-wire]");
        if (!btn) return;
        submit(btn.getAttribute("data-wire"));
      });
      if (field) {
        field.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter" && !ctx.multiline && !ev.shiftKey) {
            ev.preventDefault();
            submit("ok");
          }
        });
      }
    })();
  </script>
</body>
</html>

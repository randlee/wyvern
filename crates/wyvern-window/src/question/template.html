<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #f6f6f6;
      color: #1a1a1a;
    }
    #title-bar {
      -webkit-app-region: drag;
      padding-right: 12px;
      height: 36px;
      line-height: 36px;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    #title-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #window-controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 2px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    #window-controls button {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      color: inherit;
    }
    #window-controls button:hover {
      background: rgba(0, 0, 0, 0.08);
    }
    #content {
      flex: 1;
      min-height: 0;
      padding: 12px 16px 8px;
      font-size: 13px;
      line-height: 1.45;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .question-card {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .card-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      margin-bottom: 4px;
    }
    .card-prompt {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      word-wrap: break-word;
    }
    .option-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 0;
      -webkit-app-region: no-drag;
    }
    .option-row input {
      margin-top: 3px;
      flex-shrink: 0;
    }
    .option-text {
      min-width: 0;
      flex: 1;
    }
    .option-label {
      font-weight: 500;
    }
    .option-description {
      font-size: 12px;
      color: #555;
      margin-top: 1px;
    }
    .option-row.has-preview {
      flex-wrap: wrap;
    }
    .option-preview {
      flex: 1 1 140px;
      min-width: 120px;
      max-width: 100%;
      margin-left: 22px;
      padding: 6px 8px;
      background: #f0f3f7;
      border: 1px solid #d0d7e2;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.35;
      overflow: auto;
      max-height: 120px;
    }
    .option-preview pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }
    .option-preview code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }
    .option-preview p {
      margin: 0 0 0.4em;
    }
    .option-preview p:last-child {
      margin-bottom: 0;
    }
    .option-preview table {
      border-collapse: collapse;
      width: 100%;
    }
    .option-preview th,
    .option-preview td {
      border: 1px solid #c5cdd8;
      padding: 2px 4px;
    }
    #submit-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 12px 12px;
      flex-shrink: 0;
    }
    #submit-bar button {
      -webkit-app-region: no-drag;
      min-width: 72px;
      padding: 6px 14px;
      font-size: 13px;
      border: 1px solid #1a6fd0;
      border-radius: 4px;
      background: #2680eb;
      color: #fff;
      cursor: pointer;
    }
    #submit-bar button:focus {
      outline: 2px solid #2680eb;
      outline-offset: 1px;
    }
    #submit-bar button:disabled {
      opacity: 0.55;
      cursor: default;
    }
    #validation-hint {
      padding: 0 16px 8px;
      font-size: 12px;
      color: #a33;
      flex-shrink: 0;
      display: none;
    }
  </style>
</head>
<body>
  <div id="title-bar" style="{{TITLE_BAR_STYLE}}">
    <span id="title-text">{{TITLE}}</span>
    {{WINDOW_CONTROLS_BLOCK}}
  </div>
  <div id="content">{{CARDS}}</div>
  <div id="validation-hint">Select an answer for every question before submitting.</div>
  <div id="submit-bar">
    <button type="button" id="submit-btn" class="primary">Submit</button>
  </div>
  <script>
    (function () {
      var ctx = {{CONTEXT_JSON}};
      var hint = document.getElementById("validation-hint");
      var submit = document.getElementById("submit-btn");

      function collectAnswers() {
        var answers = {};
        for (var i = 0; i < ctx.questions.length; i++) {
          var card = ctx.questions[i];
          var name = "q" + i;
          var selected = [];
          var nodes = document.querySelectorAll('input[name="' + name + '"]:checked');
          for (var j = 0; j < nodes.length; j++) {
            selected.push(nodes[j].value);
          }
          if (selected.length === 0) {
            return null;
          }
          answers[card.question] = selected.join(", ");
        }
        return answers;
      }

      submit.addEventListener("click", function () {
        var answers = collectAnswers();
        if (!answers) {
          hint.style.display = "block";
          return;
        }
        hint.style.display = "none";
        window.ipc.postMessage(JSON.stringify({
          kind: "question_submitted",
          answers: answers
        }));
      });
    })();
  </script>
  <script>
    (function () {
      var controls = document.getElementById("window-controls");
      if (!controls) return;
      controls.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button[data-action]");
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        if (action === "close") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_close" }));
        } else if (action === "minimize") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_minimize" }));
        }
      });
    })();
  </script>
</body>
</html>

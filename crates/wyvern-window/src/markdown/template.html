<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
  <style>{{STYLESHEET}}</style>
</head>
<body>
  <div id="title-bar" style="{{TITLE_BAR_STYLE}}">
    <span id="title-text">{{TITLE}}</span>
    {{WINDOW_CONTROLS_BLOCK}}
  </div>
  {{STATUS_BLOCK}}
  <div id="content">
    <div id="markdown-body">{{BODY}}</div>
  </div>
  <div id="button-bar">{{BUTTONS}}</div>
  <script>
    (function () {
      var ctx = {{CONTEXT_JSON}};
      var bar = document.getElementById("button-bar");
      var focusIdx = typeof ctx.default_button === "number" ? ctx.default_button : 0;
      var buttons = bar.querySelectorAll("button");
      if (buttons.length > 0) {
        var target = buttons[Math.min(Math.max(focusIdx, 0), buttons.length - 1)];
        target.focus();
      }
      bar.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button[data-wire]");
        if (!btn) return;
        window.ipc.postMessage(JSON.stringify({
          kind: "button_pressed",
          label: btn.getAttribute("data-wire")
        }));
      });
    })();
  </script>
  <script>
    (function () {
      var controls = document.getElementById("window-controls");
      if (!controls) return;
      controls.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button[data-action]");
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        if (action === "close") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_close" }));
        } else if (action === "minimize") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_minimize" }));
        }
      });
    })();
  </script>
</body>
</html>

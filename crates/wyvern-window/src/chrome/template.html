<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #title-bar {
      -webkit-app-region: drag;
      padding-right: 12px;
      height: 36px;
      line-height: 36px;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }
    #title-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #window-controls {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 2px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    #window-controls button {
      -webkit-app-region: no-drag;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      color: inherit;
    }
    #window-controls button:hover {
      background: rgba(0, 0, 0, 0.08);
    }
    #status-bar {
      padding: 4px 12px;
      font-size: 12px;
      opacity: 0.75;
      flex-shrink: 0;
    }
    #status-bar:empty { display: none; }
    #content {
      flex: 1;
      min-height: 0;
    }
    #button-bar[hidden] { display: none; }
  </style>
</head>
<body>
  <div id="title-bar" style="{{TITLE_BAR_STYLE}}">
    <span id="title-text">{{TITLE}}</span>
    {{WINDOW_CONTROLS_BLOCK}}
  </div>
  {{STATUS_BLOCK}}
  <div id="content"></div>
  <div id="button-bar" hidden></div>
  <script>
    (function () {
      var controls = document.getElementById("window-controls");
      if (!controls) return;
      controls.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button[data-action]");
        if (!btn) return;
        var action = btn.getAttribute("data-action");
        if (action === "close") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_close" }));
        } else if (action === "minimize") {
          window.ipc.postMessage(JSON.stringify({ kind: "window_minimize" }));
        }
      });
    })();
  </script>
</body>
</html>
